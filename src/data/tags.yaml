# Taxonomia de tags (sistema de classificação do catálogo).
# Fonte única de verdade: editar aqui é suficiente para o filtro aparecer.
# slug   = usado no front-matter dos projetos
# pt/en  = rótulo bilíngue exibido no carimbo
# codigo = prefixo de 2 letras da cota quando a tag é a categoria-principal
#
# Regras (validadas no build):
#   - toda tag usada num projeto precisa existir aqui;
#   - a `categoria-principal` de um projeto precisa existir aqui;
#   - a `cota` precisa começar com o `codigo` da categoria-principal (ex.: DV·2024.01).

